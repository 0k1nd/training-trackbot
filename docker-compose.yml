services:
  web:
    build:
      context: .
      dockerfile: backend/docker/dev/Dockerfile.backend.dev
    env_file:
      - .env
    environment:
      RUN_DJANGO_MIGRATIONS: "true"
    working_dir: /app/backend
    command: ["./docker/dev/cmd_start_web.sh"]
    volumes:
      - ./backend:/app/backend
      - venv-data:/opt/venv
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    networks:
      - app-network

  celery:
    build:
      context: .
      dockerfile: backend/docker/dev/Dockerfile.backend.dev
    env_file:
      - .env
    environment:
      RUN_DJANGO_MIGRATIONS: "false"
    working_dir: /app/backend
    command: ["./docker/dev/celery/cmd_start_celery.sh"]
    volumes:
      - ./backend:/app/backend
      - venv-data:/opt/venv
    depends_on:
      - db
      - redis
    networks:
      - app-network

  celery_beat:
    build:
      context: .
      dockerfile: backend/docker/dev/Dockerfile.backend.dev
    env_file:
      - .env
    environment:
      RUN_DJANGO_MIGRATIONS: "false"
    working_dir: /app/backend
    command: ["./docker/dev/celery/cmd_start_celery_beat.sh"]
    volumes:
      - ./backend:/app/backend
      - venv-data:/opt/venv
    depends_on:
      - db
      - redis
    networks:
      - app-network

  bot:
    build:
      context: .
      dockerfile: bot/docker/Dockerfile.dev
    env_file:
      - .env
    working_dir: /app
    command: ["python", "-m", "app.main"]
    volumes:
      - ./bot:/app
      - bot-venv-data:/opt/venv
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    volumes:
      - redisdata:/data
    networks:
      - app-network

volumes:
  pgdata:
  redisdata:
  venv-data:
  bot-venv-data:

networks:
  app-network:
    driver: bridge
